; PlatformIO Project Configuration File
; DIY Flipper Zero — ESP32-S3 N16R8 (16MB Flash, 8MB OPI PSRAM)
; Board: ESP-General / OLED SSD1106G (SH1106) via I2C

; ──────────────────────────────────────────────────────────────────────────────
; PSRAM variant (use for N16R8)
; pio run -e esp32-s3-devkitc-1-psram
; ──────────────────────────────────────────────────────────────────────────────
[env:esp32-s3-devkitc-1-psram]
board_build.arduino.memory_type = qio_opi   ; enable 8MB OPI PSRAM
board_build.partitions           = custom_16Mb.csv
board_upload.flash_size          = 16MB
board_upload.maximum_size        = 16777216
extends                          = env:esp32-s3-devkitc-1


; ──────────────────────────────────────────────────────────────────────────────
; Base environment (for 8MB or PSRAM-less builds)
; ──────────────────────────────────────────────────────────────────────────────
[env:esp32-s3-devkitc-1]
board                  = ESP-General
board_build.partitions = custom_8Mb.csv

build_src_filter = ${env.build_src_filter} +<../boards/ESP-General>

build_flags =
    ${env.build_flags}
    -Iboards/ESP-General
    -DCORE_DEBUG_LEVEL=0
    -Os

    ; ── Device ────────────────────────────────────────────────────────────────
    -DDEVICE_NAME='"BruceButBetter"'
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DUSB_as_HID=1

    ; ── I2C bus (OLED + PN532) ────────────────────────────────────────────────
    -DGROVE_SDA=8
    -DGROVE_SCL=18

    ; ── OLED SSD1106G / SH1106 (128×64, I2C) ─────────────────────────────────
    -DHAS_SCREEN=1
    -DUSE_LOVYANGFX=1
    -DLOVYAN_PANEL=Panel_SH110x
    -DLOVYAN_BUS=Bus_I2C
    -DLOVYAN_I2C_BUS=1
    -DTFT_I2C_ADDR=0x3C
    -DTFT_RST=-1
    -DTFT_WIDTH=128
    -DTFT_HEIGHT=64
    -DTFT_MEM_HEIGHT=64
    -DTFT_MEM_WIDTH=128
    -DTFT_OFFSET_X=0
    -DTFT_OFFSET_Y=0
    -DTFT_INVERTION=0
    -DTFT_RGB_ORDER=0
    -DTFT_I2C_PORT=0
    -DTFT_I2C_WRITE=400000
    -DTFT_I2C_READ=400000
    -DTFT_SDA=8
    -DTFT_SCL=18
    -DTFT_ADDR=0x3C
    -DTFT_CS=-1
    -DTFT_BUSY_PIN=-1
    -DTFT_BL=-1
    -DBACKLIGHT=-1
    -DMINBRIGHT=0
    -DROTATION=0
    -DSMOOTH_FONT=0
    -DTFT_DISPON=0x29
    -DTFT_DISPOFF=0x28

    ; ── Font sizes ────────────────────────────────────────────────────────────
    -DFP=1
    -DFM=2
    -DFG=3

    ; ── 128x64 OLED layout optimization ────────────────────────────────────────
    ; Shrink the status bar and margins for the small screen (defaults are
    ; tuned for color TFTs). This leaves more of the 64px height for content.
    -DSTATUS_BAR_HEIGHT=20   ; default 30 -> pulls divider/clock up
    -DBORDER_PAD_Y=22        ; default 28 -> content starts higher
    -DBORDER_PAD_X=6         ; default 10 -> more characters per line

    ; ── SPI bus ───────────────────────────────────────────────────────────────
    -DSPI_MOSI_PIN=11
    -DSPI_SCK_PIN=12
    -DSPI_MISO_PIN=13
    -DSPI_SS_PIN=10

    ; ── CC1101 ────────────────────────────────────────────────────────────────
    -DUSE_CC1101_VIA_SPI
    -DCC1101_GDO0_PIN=9
    -DCC1101_SS_PIN=10
    -DCC1101_MOSI_PIN=11
    -DCC1101_SCK_PIN=12
    -DCC1101_MISO_PIN=13

    ; ── MicroSD ───────────────────────────────────────────────────────────────
    -DSDCARD_CS=14
    -DSDCARD_MOSI=11
    -DSDCARD_SCK=12
    -DSDCARD_MISO=13

    ; ── NRF24L01 #1 (CE=4, CSN=5) ────────────────────────────────────────────
    -DUSE_NRF24_VIA_SPI
    -DNRF24_CE_PIN=4
    -DNRF24_SS_PIN=5
    -DNRF24_MOSI_PIN=11
    -DNRF24_SCK_PIN=12
    -DNRF24_MISO_PIN=13

    ; ── IR (RX=IO1, TX=IO2) ───────────────────────────────────────────────────
    -DRXLED=1
    -DTXLED=2
    -DLED_ON=HIGH
    -DLED_OFF=LOW
    -DIR_TX_PINS='{{"IR TX", 2}}'
    -DIR_RX_PINS='{{"IR RX", 1}}'

    ; ── RF433 (single-pin module - fallback, CC1101 preferred) ───────────────
    -DRF_TX_PINS='{{"RF TX", 2}}'
    -DRF_RX_PINS='{{"RF RX", 1}}'

    ; ── Buzzer ────────────────────────────────────────────────────────────────
    -DBUZZ_PIN=47

    ; ── Buttons (active-LOW) ──────────────────────────────────────────────────
    -DBTN_ALIAS='"OK"'
    -DSEL_BTN=40
    -DUP_BTN=15
    -DDW_BTN=16
    -DL_BTN=38
    -DR_BTN=39
    -DESC_BTN=41
    -DBTN_ACT=LOW

    ; ── No GPS/LoRa/Ethernet/FM ──────────────────────────────────────────────
    -DDISABLE_LORA
    -DDISABLE_GPS
    -DDISABLE_ETHERNET
    -DDISABLE_FM

    ; ── Serial pins ──────────────────────────────────────────────────────────
    -DSERIAL_TX=43
    -DSERIAL_RX=44

lib_deps =
    ${env.lib_deps}
    etherkit/Etherkit Si5351@^2.1.4
    lovyan03/LovyanGFX@^1.2.0

lib_ignore =
    TFT_eSPI
