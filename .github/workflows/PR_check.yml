---
name: Build and Push OR check-PR

on:
  pull_request:
    branches:
      - main, dev
  workflow_dispatch:
    inputs:
      board:
        description: "Board to Compile"
        type: choice
        required: true
        default: "ESP32-S3"
        options: ["ESP32-S3"]

jobs:
  compile_sketch:
    name: Build ${{ matrix.board.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board:
          - {
              name: "ESP-General (DIY Flipper, ESP32-S3 N16R8)",
              env: "esp32-s3-devkitc-1-psram",
              partitions: { bootloader_addr: "0x0" },
            }
    steps:
      - uses: actions/checkout@v4

      - id: build
        name: setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install build deps (multilib)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-multilib libc6-dev-i386

      # - name: Cache pip
      #   uses: actions/cache@v4
      #   with:
      #     path: ~/.cache/pip
      #     key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
      #     restore-keys: |
      #       ${{ runner.os }}-pip-

      # - name: Cache PlatformIO
      #   uses: actions/cache@v4
      #   with:
      #     path: |
      #       ~/.platformio
      #     key: Bruce-platformio-${{ hashFiles('**/platformio.ini') }}
      #     restore-keys: Bruce-platformio-

      # - name: Restore PIO
      #   uses: actions/cache/restore@v4
      #   with:
      #     path: |
      #       ${{ github.workspace }}/.pio
      #     key: Bruce-pio-${{ matrix.board.env }}-${{ github.run_id }}-${{ github.run_attempt }}
      #     restore-keys: |
      #           Bruce-pio-${{ matrix.board.env }}-

      - name: Install PlatformIO Core
        run: |
          pip install platformio requests esptool intelhex

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            version=${{ github.ref_name }}
          else
            version="${GITHUB_SHA::7}"
          fi

          sed -i "s/-DBRUCE_VERSION=/-DBRUCE_VERSION='\"$version\"' ; /g" ./platformio.ini
          sed -i "s/-DGIT_COMMIT_HASH='\"Homebrew\"'/\!echo '-DGIT_COMMIT_HASH=\\\\\\\\\"'\$\(git describe --always --dirty)'\\\\\\\\\"'/g" ./platformio.ini

          cat ./platformio.ini

      - name: Run Compile
        run: |
          platformio run -e ${{ matrix.board.env }}

      # - name: Cache PIO
      #   uses: actions/cache/save@v4
      #   with:
      #     path: |
      #       ${{ github.workspace }}/.pio
      #     key: Bruce-pio-${{ matrix.board.env }}-${{ github.run_id }}-${{ github.run_attempt }}

      # - name: Merge Files
      #   run: |
      #    pio run -e ${{ matrix.board.env }} -t build-firmware

      - name: Upload ${{ matrix.board.name }}
        uses: actions/upload-artifact@v4
        with:
          name: Bruce-${{ matrix.board.env }}
          path: Bruce-*.bin
          retention-days: 5
          if-no-files-found: error
